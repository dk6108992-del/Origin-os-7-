name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract project
        run: unzip OriginOSLauncher.tar.gz -d OriginOSLauncher

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find gradlew
        run: find . -name gradlew

      - name: Build APK
        run: cd OriginOSLauncher && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OriginOS-Launcher-APK
          path: OriginOSLauncher/app/build/outputs/apk/debug/app-debug.apk
